[build]
# `npm ci` requires lock-perfect sync, but optional native deps like
# @emnapi/* are only added to the lock when installing on Linux. Use
# `npm install` so missing optional deps get fetched at deploy time.
buildCommand = "npm install --no-audit --no-fund && npm run build"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
